version: "3"

networks:
  grafana:

volumes:
  app_data: {}

services:
  prometheus:
    image: prom/prometheus:v2.34.0
    volumes:
      - ./prometheus/:/etc/prometheus/
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Active la réception des métriques poussées par Alloy (remote_write).
      - "--web.enable-remote-write-receiver"
    ports:
      - 9090:9090
    networks:
      - grafana

  loki:
    image: grafana/loki:2.4.2
    ports:
      - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - grafana

  # Promtail est désormais remplacé par Alloy (voir le service "alloy").
  # On le laisse commenté pour pouvoir revenir en arrière facilement.
  # promtail:
  #   image: grafana/promtail:2.0.0
  #   volumes:
  #     - app_data:/var/log
  #   networks:
  #     - grafana

  alloy:
    image: grafana/alloy:latest
    volumes:
      # Le fichier de configuration River.
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      # Même volume que l'app pour lire /var/log/tns-app.log (comme Promtail).
      - app_data:/var/log
    command:
      - "run"
      # Expose l'UI de debug d'Alloy sur le port 12345.
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    ports:
      - 12345:12345
    networks:
      - grafana

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - 3000:3000
    networks:
      - grafana
    environment:
      - "GF_DEFAULT_APP_MODE=development"
      - "GF_LOG_LEVEL=debug"

  app:
    build: ./app
    ports:
      - 8081:80
    volumes:
      - app_data:/var/log
    networks:
      - grafana

  db:
    image: grafana/tns-db:latest
    ports:
      - 8082:80
    networks:
      - grafana
